<h1>Available Courses</h1>

<div *ngFor="let course of courses" class="course-card">

  <h2>{{ course.courseName }}</h2>

  <p>{{ course.description }}</p>

  <p>
    <strong>Category:</strong>
    {{ course.category }}
  </p>

  <p>
    <strong>Price:</strong>
    ₹{{ course.price }}
  </p>

</div>
