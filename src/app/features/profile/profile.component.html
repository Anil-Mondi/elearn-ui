@if(isLoading){

<div class="loading">

    Loading Profile...

</div>

}

@else{

<div class="profile-container">

    <div class="profile-card">

        <div class="profile-header">

            <div class="avatar">

                {{user.name.charAt(0)}}

            </div>

            <h1>

                {{user.name}}

            </h1>

            <p>

                Learner

            </p>

        </div>

        <div class="profile-body">

            <div class="profile-item">

                <span class="label">

                    📧 Email

                </span>

                <span class="value">

                    {{user.email}}

                </span>

            </div>

            <div class="profile-item">

                <span class="label">

                    📱 Contact

                </span>

                <span class="value">

                    {{user.contactNumber}}

                </span>

            </div>

            <div class="profile-item">

                <span class="label">

                    🎓 Role

                </span>

                <span class="value">

                    Learner

                </span>

            </div>

            <div class="profile-item">

                <span class="label">

                    🚀 Platform

                </span>

                <span class="value">

                    E-Learn

                </span>

            </div>

        </div>

    </div>

</div>

}
